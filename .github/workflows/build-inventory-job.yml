name: Build inventory job container

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - requirements.txt
      - scripts/**
      - scrapers/**
      - .dockerignore
      - .github/workflows/build-inventory-job.yml

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: quivrracrprod.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build image
        run: |
          docker build -t quivrracrprod.azurecr.io/quivrr-inventory-job:latest .

      - name: Push image
        run: |
          docker push quivrracrprod.azurecr.io/quivrr-inventory-job:latest
